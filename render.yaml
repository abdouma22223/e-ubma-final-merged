services:
  # 1. Backend Service (FastAPI)
  - type: web
    name: e-ubma-backend
    env: python
    plan: free # Use the free plan to avoid payment info
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false # You will provide this from Supabase (Free)
      - key: GROQ_API_KEY
        sync: false

  # 2. Frontend Service (Static Site)
  - type: web
    name: e-ubma-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: e-ubma-backend
          property: host
